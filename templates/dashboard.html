<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Agents MVP</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Заголовок -->
        <header class="dashboard-header">
            <h1>🤖 AI Multi-Agent MVP System</h1>
            <div class="header-status">
                <span id="mode-badge" class="badge">{{ mode }}</span>
            </div>
        </header>

        <!-- Основной контент: Grid layout -->
        <div class="dashboard-grid">
            <!-- Агент А (слева) -->
            <div class="agent-window agent-a-window">
                <div class="window-header">
                    <h2>🔍 Агент А</h2>
                    <span id="agent-a-status" class="status-badge">Ожидание</span>
                </div>
                
                <div class="window-controls">
                    <button id="start-btn" class="btn btn-primary">▶️ Запустить</button>
                    <button id="run-session-btn" class="btn btn-success">🚀 Сессия</button>
                    <button id="stop-btn" class="btn btn-danger" disabled>⏹️ Стоп</button>
                </div>

                <div class="window-stats">
                    <div class="stat-item">
                        <span class="stat-label">Найдено:</span>
                        <span id="projects-count" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Подходящих:</span>
                        <span id="suitable-count" class="stat-value">0</span>
                    </div>
                </div>

                <div class="window-results">
                    <div class="results-header">
                        <h3>Результаты</h3>
                        <span class="search-keyword">{{ keyword }}</span>
                    </div>
                    <div id="results-a" class="results-content">
                        <p class="empty-state">Запустите поиск для начала работы</p>
                    </div>
                </div>
            </div>

            <!-- Агент Б (справа) -->
            <div class="agent-window agent-b-window">
                <div class="window-header">
                    <h2>🚀 Агент Б</h2>
                    <span id="agent-b-status" class="status-badge">Готов</span>
                </div>

                <div class="window-controls">
                    <select id="mvp-template" class="select-input">
                        <option value="">-- Шаблон --</option>
                        <option value="telegram-shop-bot">🤖 Telegram Shop Bot</option>
                        <option value="news-parser">📰 News Parser</option>
                        <option value="analytics-dashboard">📊 Analytics Dashboard</option>
                        <option value="email-campaign-manager">📬 Email Campaign Manager</option>
                        <option value="brand-mention-monitor">📰 Brand Mention Monitor</option>
                        <option value="data-formatter">🧹 Data Formatter</option>
                        <option value="mini-etl-pipeline">🔄 Mini ETL Pipeline</option>
                        <option value="price-stock-parser">💰 Price & Stock Parser</option>
                    </select>
                    <button id="generate-mvp-btn" class="btn btn-mvp" disabled>🎯 Генерировать</button>
                </div>

                <div class="window-results">
                    <div class="results-header">
                        <h3>Результаты</h3>
                    </div>
                    <div id="results-b" class="results-content">
                        <p class="empty-state">Выберите шаблон и нажмите "Генерировать"</p>
                    </div>
                </div>

                <div id="mvp-status" class="status-message"></div>
            </div>

            <!-- Общие логи (по центру внизу) -->
            <div class="logs-window">
                <div class="window-header">
                    <h3>📝 Общие логи</h3>
                    <button id="clear-logs" class="btn btn-small">🗑️</button>
                </div>
                <div id="logs-container" class="logs-content">
                    <div id="logs" class="logs"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
