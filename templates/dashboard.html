<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent System Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-grid">
            <!-- Agent A Card -->
            <div class="agent-card">
                <div class="card-title">Agent A</div>
                <div class="card-content">
            <div class="form-group">
                        <label class="form-label" for="agent-a-kwork-url">Или вставьте ссылку на проект Kwork:</label>
                        <input type="url" id="agent-a-kwork-url" class="form-input" placeholder="https://kwork.ru/projects/2996436/view" pattern="https://kwork\.ru/projects/\d+/view">
                        <button id="agent-a-load-url" class="btn btn-secondary" style="margin-top: 8px; width: 100%;">Загрузить проект по ссылке</button>
                    </div>
                    <div class="form-group">
                        <input type="text" id="agent-a-input" class="form-input" placeholder="Ключевые слова (только кириллица, запятые, пробелы)" pattern="[а-яА-ЯёЁ\s,.-]*" title="Разрешены только русские буквы, пробелы, запятые и дефисы">
                    </div>
                    <div class="form-group form-group-row">
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-time-left">Осталось ≤</label>
                            <input type="number" id="agent-a-time-left" class="form-input-inline" placeholder="ч макс" min="0" step="1" title="Максимальное оставшееся время (часы)">
                        </div>
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-hired-min">Нанято</label>
                            <input type="number" id="agent-a-hired-min" class="form-input-inline" placeholder="%" min="0" max="100" step="1">
                        </div>
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-proposals-max">Предложений</label>
                            <input type="number" id="agent-a-proposals-max" class="form-input-inline" placeholder="макс" min="0" step="1">
                        </div>
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-budget">Бюджет</label>
                            <input type="number" id="agent-a-budget" class="form-input-inline" placeholder="₽ мин" min="0" step="100" title="Минимальный бюджет (руб.)">
                        </div>
            </div>
            <div class="form-group">
                        <div class="button-group">
                            <button id="agent-a-button" class="btn btn-primary">Execute</button>
                            <button id="agent-a-stop-button" class="btn btn-stop hidden">Stop</button>
                        </div>
            </div>
                    <div class="form-group">
                        <div class="timer-label">Время работы</div>
                        <div id="agent-a-timer" class="timer-value">00:00:00</div>
            </div>
                    <div class="form-group">
                        <div class="status-label">Status</div>
                        <div id="agent-a-status" class="status-value">Waiting</div>
            </div>
                    <div class="form-group">
                        <div class="results-label">Results</div>
                        <div id="agent-a-results" class="results-list"></div>
                </div>
            </div>
        </div>

            <!-- Agent B Card -->
            <div class="agent-card">
                <div class="card-title">Agent B</div>
                <div class="card-content">
                    <div class="form-group">
                        <label class="form-label" for="agent-b-project-select">Выберите проект из Agent A:</label>
                        <select id="agent-b-project-select" class="form-select">
                            <option value="">-- Выберите проект --</option>
                            <option value="A" disabled style="display: none;">Проект A</option>
                            <option value="B" disabled style="display: none;">Проект B</option>
                            <option value="C" disabled style="display: none;">Проект C</option>
                            <option value="D" disabled style="display: none;">Проект D</option>
                            <option value="E" disabled style="display: none;">Проект E</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="agent-b-dropdown">Шаблон MVP:</label>
                        <select id="agent-b-dropdown" class="form-select">
                            <option value="">Select template</option>
                            <option value="telegram-shop-bot">Telegram Shop Bot</option>
                            <option value="news-parser">News Parser</option>
                            <option value="analytics-dashboard">Analytics Dashboard</option>
                            <option value="email-campaign-manager">Email Campaign Manager</option>
                            <option value="brand-mention-monitor">Brand Mention Monitor</option>
                            <option value="data-formatter">Data Formatter</option>
                            <option value="mini-etl-pipeline">Mini ETL Pipeline</option>
                            <option value="price-stock-parser">Price & Stock Parser</option>
                            <option value="web-scraper">Universal Web Scraper</option>
                            <option value="api-services">API Services Manager</option>
                            <option value="freelance-project-search">Freelance Project Search</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="agent-b-textarea">Описание проекта:</label>
                        <textarea id="agent-b-textarea" class="form-textarea" placeholder="Описание проекта будет заполнено автоматически при выборе проекта из Agent A" rows="4"></textarea>
                    </div>
            <div class="form-group">
                <div class="radio-group">
                            <label class="radio-label">
                        <input type="radio" name="build-type" value="mock" checked>
                                <span>Mock MVP</span>
                    </label>
                            <label class="radio-label">
                        <input type="radio" name="build-type" value="full">
                                <span>Full MVP</span>
                    </label>
                </div>
            </div>
                    <div class="form-group">
                        <button id="agent-b-button" class="btn btn-secondary">Generate</button>
                    </div>
                    <div class="form-group">
                        <div class="logs-label">Output Logs</div>
                        <div id="agent-b-logs" class="logs-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
