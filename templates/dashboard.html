<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Agent MVP System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <!-- Agent A Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Agent A — Search Projects</h2>
            </div>

            <div class="card-body">
                <!-- Controls Section -->
                <div class="section">
                    <div class="section-title">Search Configuration</div>
                    <div class="form-row">
                        <label for="search-keywords">Keywords</label>
                        <input type="text" id="search-keywords" class="input-field" value="{{ keyword }}" placeholder="Enter search keywords">
                    </div>
                    <div class="button-group">
                        <button id="start-btn" class="btn btn-primary">Start Search</button>
                        <button id="run-session-btn" class="btn btn-secondary">Single Session</button>
                        <button id="stop-btn" class="btn btn-secondary" disabled>Stop</button>
                    </div>
                </div>

                <!-- Status Section -->
                <div class="section">
                    <div class="section-title">Status</div>
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="status-label">Status</span>
                            <span id="agent-a-status" class="status-value">Waiting</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Found</span>
                            <span id="projects-count" class="status-value">0</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Last Check</span>
                            <span id="last-check" class="status-value">-</span>
                        </div>
                    </div>
                </div>

                <!-- Results Section -->
                <div class="section section-results">
                    <div class="section-header">
                        <div class="section-title">Results</div>
                        <button id="clear-logs-a" class="btn-clear">Clear</button>
                    </div>
                    <div id="logs-container-a" class="results-output">
                        <div id="logs-a" class="logs-content"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Agent B Card -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Agent B — Generate MVP</h2>
            </div>

            <div class="card-body">
                <!-- Configuration Section -->
                <div class="section">
                    <div class="section-title">Configuration</div>
                    <div class="form-row">
                        <label for="mvp-template">Template</label>
                        <select id="mvp-template" class="select-field">
                            <option value="">Select template</option>
                            <option value="telegram-shop-bot">Telegram Shop Bot</option>
                            <option value="news-parser">News Parser</option>
                            <option value="analytics-dashboard">Analytics Dashboard</option>
                            <option value="email-campaign-manager">Email Campaign Manager</option>
                            <option value="brand-mention-monitor">Brand Mention Monitor</option>
                            <option value="data-formatter">Data Formatter</option>
                            <option value="mini-etl-pipeline">Mini ETL Pipeline</option>
                            <option value="price-stock-parser">Price & Stock Parser</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label for="project-description">Project Description</label>
                        <textarea id="project-description" class="textarea-field" rows="4" placeholder="Enter project description"></textarea>
                    </div>
                    <div class="form-row">
                        <label class="form-label">Build Type</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="build-type" value="mock" checked>
                                <span>Mock</span>
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="build-type" value="full">
                                <span>Full</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Action Section -->
                <div class="section">
                    <div class="section-title">Actions</div>
                    <div class="action-row">
                        <button id="generate-mvp-btn" class="btn btn-primary">Generate MVP</button>
                        <span id="mvp-status" class="status-text">Select template</span>
                    </div>
                </div>

                <!-- Output Section -->
                <div class="section section-results">
                    <div class="section-header">
                        <div class="section-title">Output</div>
                        <button id="clear-logs-b" class="btn-clear">Clear</button>
                    </div>
                    <div id="logs-container-b" class="results-output">
                        <div id="logs-b" class="logs-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
