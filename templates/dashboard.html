<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent System Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-grid">
            <!-- Agent A Card -->
            <div class="agent-card">
                <div class="card-title">Agent A</div>
                <div class="card-content">
                    <div class="form-group">
                        <input type="text" id="agent-a-input" class="form-input" placeholder="Ключевые слова (только кириллица, запятые, пробелы)" pattern="[а-яА-ЯёЁ\s,.-]*" title="Разрешены только русские буквы, пробелы, запятые и дефисы">
                    </div>
                    <div class="form-group form-group-row">
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-time-left">Осталось</label>
                            <input type="number" id="agent-a-time-left" class="form-input-inline" placeholder="ч" min="0" step="1">
                        </div>
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-hired-min">Нанято</label>
                            <input type="number" id="agent-a-hired-min" class="form-input-inline" placeholder="%" min="0" max="100" step="1">
                        </div>
                        <div class="form-field-inline">
                            <label class="form-label-inline" for="agent-a-proposals-max">Предложений</label>
                            <input type="number" id="agent-a-proposals-max" class="form-input-inline" placeholder="макс" min="0" step="1">
                        </div>
                    </div>
                    <div class="form-group">
                        <button id="agent-a-button" class="btn btn-primary">Execute</button>
                    </div>
                    <div class="form-group">
                        <div class="status-label">Status</div>
                        <div id="agent-a-status" class="status-value">Waiting</div>
                    </div>
                    <div class="form-group">
                        <div class="results-label">Results</div>
                        <div id="agent-a-results" class="results-list"></div>
                    </div>
                </div>
            </div>

            <!-- Agent B Card -->
            <div class="agent-card">
                <div class="card-title">Agent B</div>
                <div class="card-content">
            <div class="form-group">
                        <select id="agent-b-dropdown" class="form-select">
                    <option value="">Select template</option>
                    <option value="telegram-shop-bot">Telegram Shop Bot</option>
                    <option value="news-parser">News Parser</option>
                    <option value="analytics-dashboard">Analytics Dashboard</option>
                    <option value="email-campaign-manager">Email Campaign Manager</option>
                    <option value="brand-mention-monitor">Brand Mention Monitor</option>
                    <option value="data-formatter">Data Formatter</option>
                    <option value="mini-etl-pipeline">Mini ETL Pipeline</option>
                    <option value="price-stock-parser">Price & Stock Parser</option>
                </select>
            </div>
            <div class="form-group">
                        <textarea id="agent-b-textarea" class="form-textarea" placeholder="Enter project description" rows="4"></textarea>
            </div>
            <div class="form-group">
                <div class="radio-group">
                            <label class="radio-label">
                        <input type="radio" name="build-type" value="mock" checked>
                                <span>Mock MVP</span>
                    </label>
                            <label class="radio-label">
                        <input type="radio" name="build-type" value="full">
                                <span>Full MVP</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                        <button id="agent-b-button" class="btn btn-secondary">Generate</button>
            </div>
                    <div class="form-group">
                        <div class="logs-label">Output Logs</div>
                        <div id="agent-b-logs" class="logs-container"></div>
                </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
